<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summit Custom Cards - Custom Football Cards</title>
    <style>
        /* CSS STYLES */
        :root {
            --primary: #1a1a1a;
            --accent: #ffd700;
            --light: #f4f4f4;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 10; }
        .header-container { display: flex; justify-content: space-around; align-items: center; }
        .cart-btn { background: var(--accent); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .navbar { background: #333; display: flex; justify-content: center; gap: 20px; padding: 10px; }
        .nav-link { color: white; text-decoration: none; font-weight: 500; }

        .section { padding: 40px 20px; max-width: 1200px; margin: auto; }
        h2 { border-bottom: 3px solid var(--accent); display: inline-block; margin-bottom: 20px; }

        /* CARD DESIGN */
        .customizer-container { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; align-items: flex-start; }
        
        #card-display {
            width: 300px;
            height: 420px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            border: 8px solid var(--accent);
            background-size: cover;
            background-position: center;
        }

        /* Card Themes */
        .bg-gold { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .bg-silver { background: linear-gradient(135deg, #e0e0e0, #757575); }
        .bg-blue { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .bg-red { background: linear-gradient(135deg, #7f1d1d, #ef4444); }

        .player-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .card-info { z-index: 2; }
        #player-name { font-size: 2rem; margin: 0; text-transform: uppercase; }
        #player-number { font-size: 3rem; margin: 0; position: absolute; top: 10px; right: 20px; opacity: 0.9; }

        .customizer-form { display: flex; flex-direction: column; gap: 15px; width: 300px; }
        input, select { padding: 12px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-primary { background: #22c55e; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; }

        /* MODALS */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 500px; border-radius: 10px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 28px; cursor: pointer; }

        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 10px 0; }
        .total { font-size: 1.5rem; color: #cc0000; }
        footer { text-align: center; padding: 20px; background: var(--primary); color: white; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>⚽ Summit Custom Cards</h1>
            <button id="cart-btn" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <nav class="navbar">
        <a href="#customize" class="nav-link">Create Card</a>
        <a href="#about" class="nav-link">About</a>
    </nav>

    <main>
        <section id="customize" class="section">
            <h2>Design Your Custom Card</h2>
            <div class="customizer-container">
                <div class="card-preview">
                    <div id="card-display" class="bg-gold">
                        <img id="photo-preview" class="player-photo" src="" style="display:none;">
                        <div class="card-info">
                            <h3 id="player-name-display">YOUR NAME</h3>
                            <p id="player-number-display">00</p>
                            <p id="player-pos-display">QUARTERBACK</p>
                        </div>
                    </div>
                </div>

                <form id="customizer-form" class="customizer-form">
                    <label>Player Photo:</label>
                    <input type="file" id="photo-input" accept="image/*">
                    <input type="text" id="name-input" placeholder="Player Name" maxlength="20">
                    <input type="number" id="number-input" placeholder="Jersey Number" min="0" max="99">
                    <input type="text" id="pos-input" placeholder="Position (e.g. QB)">
                    
                    <label>Card Theme:</label>
                    <select id="bg-input">
                        <option value="gold">Elite Gold</option>
                        <option value="silver">Pro Silver</option>
                        <option value="blue">Home Blue</option>
                        <option value="red">Away Red</option>
                    </select>
                    
                    <button type="button" id="add-to-cart" class="btn-primary">Add to Cart ($19.99)</button>
                </form>
            </div>
        </section>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Your Shopping Cart</h2>
            <div id="cart-items-list"></div>
            <hr>
            <p>Subtotal: $<span id="sub-total">0.00</span></p>
            <p>Tax (10%): $<span id="tax-total">0.00</span></p>
            <h3 class="total">Total: $<span id="grand-total">0.00</span></h3>
            <button class="btn-primary" style="width:100%" onclick="alert('Proceeding to secure payment...')">Checkout Now</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Summit Custom Cards</p>
    </footer>

    <script>
        // JAVASCRIPT LOGIC
        const cart = [];
        
        // --- PREVIEW LOGIC ---
        const photoInput = document.getElementById('photo-input');
        const photoPreview = document.getElementById('photo-preview');
        const nameInput = document.getElementById('name-input');
        const numInput = document.getElementById('number-input');
        const posInput = document.getElementById('pos-input');
        const bgInput = document.getElementById('bg-input');

        const cardDiv = document.getElementById('card-display');
        const nameDisp = document.getElementById('player-name-display');
        const numDisp = document.getElementById('player-number-display');
        const posDisp = document.getElementById('player-pos-display');

        // Handle Image Upload
        photoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                photoPreview.src = URL.createObjectURL(file);
                photoPreview.style.display = 'block';
            }
        });

        // Update Text Live
        const sync = () => {
            nameDisp.textContent = nameInput.value.toUpperCase() || "YOUR NAME";
            numDisp.textContent = numInput.value || "00";
            posDisp.textContent = posInput.value.toUpperCase() || "POSITION";
            cardDiv.className = `bg-${bgInput.value}`;
        };

        [nameInput, numInput, posInput, bgInput].forEach(el => el.addEventListener('input', sync));

        // --- CART LOGIC ---
        const cartBtn = document.getElementById('cart-btn');
        const cartModal = document.getElementById('cart-modal');
        const closeBtn = document.querySelector('.close');

        cartBtn.onclick = () => {
            renderCart();
            cartModal.style.display = "block";
        }
        closeBtn.onclick = () => cartModal.style.display = "none";

        document.getElementById('add-to-cart').onclick = () => {
            const item = {
                name: nameInput.value || "Custom Card",
                price: 19.99
            };
            cart.push(item);
            document.getElementById('cart-count').textContent = cart.length;
            alert("Added to your cart!");
        };

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = "";
            let subtotal = 0;

            cart.forEach((item, index) => {
                subtotal += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>$${item.price}</span>
                    </div>`;
            });

            const tax = subtotal * 0.10;
            const total = subtotal + tax;

            document.getElementById('sub-total').textContent = subtotal.toFixed(2);
            document.getElementById('tax-total').textContent = tax.toFixed(2);
            document.getElementById('grand-total').textContent = total.toFixed(2);
        }

        // Close modal on outside click
        window.onclick = (event) => {
            if (event.target == cartModal) cartModal.style.display = "none";
        }
    </script>
</body>
</html>
